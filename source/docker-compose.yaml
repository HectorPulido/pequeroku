services:
  vm_services:
    build: ./vm_service/.
    command: ./entrypoint.sh
    volumes:
      - ./vm_data:/app/vm_data
      - /Users/hectorpulido/.ssh/id_ed25519:/root/.ssh/id_vm_pequeroku:ro
      - /Users/hectorpulido/.ssh/id_ed25519.pub:/root/.ssh/id_vm_pequeroku.pub:ro
    # devices:
    #     - /dev/kvm:/dev/kvm
    # security_opt:
    #     - seccomp=unconfined
    environment:
      VM_SSH_PRIVKEY: /root/.ssh/id_vm_pequeroku
      VM_BASE_IMAGE: /app/vm_data/base/debian12-golden.qcow2
      # Pre-baked golden image (scripts/build-golden.sh): skip cloud-init so SSH is ready in ~10s.
      VM_USE_CLOUD_INIT: "false"
    cap_add:
      - NET_ADMIN
    networks:
      - pequeroku-net
    depends_on:
      - redis
    restart: unless-stopped

  web:
    build: ./web_service/.
    command: ./entrypoint.sh
    volumes:
      - ./web_service:/app
    environment:
      # Allow internal service-to-service calls by the compose hostname (the MCP
      # server hits http://web:8000/api/v1). "localhost" is always allowed too.
      ALLOWED_HOSTS: web
    networks:
      - pequeroku-net
    depends_on:
      - db
      - redis
    restart: unless-stopped

  front-react:
    build:
      context: ./front-react
      dockerfile: Dockerfile
      args:
        FRONT_REACT_BASE: /dashboard/
    networks:
      - pequeroku-net
    restart: unless-stopped

  mcp_service:
    build: ./mcp_service/.
    command: ./entrypoint.sh
    volumes:
      - ./mcp_service:/app
    environment:
      # web_service exposes /api/v1; the MCP server forwards the caller's API key.
      PEQUEROKU_API_URL: http://web:8000
    networks:
      - pequeroku-net
    depends_on:
      - web
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx_static
    ports:
      - "80:80"
    depends_on:
      - web
      - front-react
      - mcp_service
    volumes:
      - ./web_service/staticfiles:/usr/share/nginx/static:ro # static -> django static files
      - ./front/page:/usr/share/nginx/html:ro # html -> front
      - ./landing/page:/usr/share/nginx/landing:ro # landing -> landing
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pequeroku-net
    restart: unless-stopped

  db:
    image: "postgres:16"
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - .db_data:/var/lib/postgresql/data
    networks:
      - pequeroku-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - pequeroku-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - .redis_data:/data
    restart: unless-stopped

networks:
  pequeroku-net:
    external: false
