upstream django {
    server web:8000;
}

upstream front_react {
    server front-react:80;
}

upstream mcp_service {
    server mcp_service:8002;
}

# Does the request carry an "Authorization: Bearer <token>" header? Used to gate
# the MCP transport below. The /api/v1 backend still validates the key + scopes;
# this only stops credential-less callers from reaching FastMCP at all (which
# otherwise answers initialize/tools-list and returns 400 — not 401 — to probes).
map $http_authorization $mcp_has_bearer {
    default           0;
    "~*^Bearer\s+\S"  1;
}

server {
    listen       80;
    server_name  localhost;

    # Allow larger file uploads (default is 1m, which triggers 413)
    client_max_body_size 50m;

    # Emit relative redirects (Location: /path) so the browser keeps the original
    # host:port. nginx listens on :80 inside the container (mapped to the host's
    # ${HTTP_PORT}), so an absolute redirect would otherwise drop to :80.
    absolute_redirect off;

    # --- LANDING (/ , /terms , /privacy) ---
    location = / {
        root /usr/share/nginx/landing;
        try_files /index.html =404;
    }

    location = /terms {
        root /usr/share/nginx/landing;
        try_files /terms.html =404;
    }

    location = /privacy {
        root /usr/share/nginx/landing;
        try_files /privacy.html =404;
    }

    location / {
        root /usr/share/nginx/landing;
        try_files $uri =404;
    }


    # --- STATIC ---
    location /static/ {
        root   /usr/share/nginx/;
    }

    # --- API ---
    location /api/ {
        proxy_pass         http://django/api/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass         http://django/media/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass         http://django/admin/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://django/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $http_host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- MCP server (streamable HTTP) ---
    # POST + SSE streaming: keep HTTP/1.1, disable buffering, and allow long-lived
    # connections so tool calls can stream results back.
    location /mcp {
        # Require a Bearer token at the edge: reject credential-less callers with
        # 401 instead of letting FastMCP answer them (see $mcp_has_bearer above).
        # `return` is one of the few directives that is safe inside `if`.
        if ($mcp_has_bearer = 0) {
            return 401;
        }

        proxy_pass         http://mcp_service;
        proxy_http_version 1.1;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /dashboard {
        return 302 /dashboard/;
    }

    location ^~ /dashboard/ {
        proxy_pass         http://front_react/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }


    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
