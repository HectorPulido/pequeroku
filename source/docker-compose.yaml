services:
  vm_services:
    build: ./vm_service/.
    command: ./entrypoint.sh
    volumes:
      - ./vm_data:/app/vm_data
      # Bring your own VM SSH key (optional): set VM_SSH_KEY to an ABSOLUTE path in
      # source/.env, then uncomment. Otherwise vm_service generates one in vm_data.
      # - ${VM_SSH_KEY}:/root/.ssh/id_vm_pequeroku:ro
      # - ${VM_SSH_KEY}.pub:/root/.ssh/id_vm_pequeroku.pub:ro
    # KVM passthrough is written to docker-compose.override.yaml by setup.sh on Linux
    # hosts that have /dev/kvm; on macOS nothing is written. No manual edit needed.
    environment:
      VM_SSH_PRIVKEY: /root/.ssh/id_vm_pequeroku
      VM_BASE_IMAGE: /app/vm_data/base/debian12-golden.qcow2
      # cloud-init mode is auto-resolved (off for a golden via its *.meta.json, on
      # for a plain cloud image). Uncomment to force it. See vm_service/settings.py.
      # VM_USE_CLOUD_INIT: "false"
      # Auto-download a Debian cloud image when VM_BASE_IMAGE is missing (default on).
      # VM_AUTODOWNLOAD_IMAGE: "true"
    cap_add:
      - NET_ADMIN
    networks:
      - pequeroku-net
    depends_on:
      - redis
    restart: unless-stopped

  web:
    build: ./web_service/.
    command: ./entrypoint.sh
    volumes:
      - ./web_service:/app
    environment:
      # Public Host headers Django answers to, from source/.env — a LAN IP, an
      # mDNS name, your domain. Defaults to "*" when the key is absent (older
      # .env files); set it empty to allow only the internal hosts. The compose
      # hostname "web" (the MCP server hits http://web:8000/api/v1), "localhost"
      # and "127.0.0.1" are always allowed by settings.py either way.
      ALLOWED_HOSTS: "${ALLOWED_HOSTS-*}"
      # DB credentials from source/.env, shared with the `db` service so both
      # agree on one value. web_service/.env still overrides these for web when
      # present (entrypoint.sh sources it); these are the fallback otherwise.
      DB_NAME: ${DB_NAME:-mydb}
      DB_USER: ${DB_USER:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      # External port the app is served on; Django uses it to trust CSRF origins.
      HTTP_PORT: ${HTTP_PORT:-80}
    networks:
      - pequeroku-net
    depends_on:
      - db
      - redis
    restart: unless-stopped

  front-react:
    build:
      context: ./front-react
      dockerfile: Dockerfile
      args:
        FRONT_REACT_BASE: /dashboard/
    networks:
      - pequeroku-net
    restart: unless-stopped

  mcp_service:
    build: ./mcp_service/.
    command: ./entrypoint.sh
    volumes:
      - ./mcp_service:/app
    environment:
      # web_service exposes /api/v1; the MCP server forwards the caller's API key.
      PEQUEROKU_API_URL: http://web:8000
    networks:
      - pequeroku-net
    depends_on:
      - web
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx_static
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - web
      - front-react
      - mcp_service
    volumes:
      - ./web_service/staticfiles:/usr/share/nginx/static:ro # static -> django static files
      - ./front/page:/usr/share/nginx/html:ro # html -> front
      - ./landing/page:/usr/share/nginx/landing:ro # landing -> landing
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pequeroku-net
    restart: unless-stopped

  db:
    image: "postgres:16"
    environment:
      # Interpolated from source/.env (created by setup.sh). Absent .env -> the
      # defaults below, identical to the previous hardcoded values.
      POSTGRES_DB: ${DB_NAME:-mydb}
      POSTGRES_USER: ${DB_USER:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
    volumes:
      - .db_data:/var/lib/postgresql/data
    networks:
      - pequeroku-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - pequeroku-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - .redis_data:/data
    restart: unless-stopped

networks:
  pequeroku-net:
    external: false
